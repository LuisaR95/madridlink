# 1. PUERTO
server.port=8082

# 2. CONEXION (Ruta fija en tu carpeta del proyecto, no en /tmp)
# Al quitar /tmp, los datos se guardan en una carpeta llamada 'data' dentro de tu proyecto
spring.datasource.url=jdbc:h2:file:./data/madridlink_db;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# 3. PERSISTENCIA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 4. CARGA INICIAL (Cambiado a 'never' para que no machaque tus checks)
# C\u00E1mbialo a 'never' una vez que ya veas los tr\u00E1mites en tu pantalla por primera vez
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# 5. CONSOLA H2
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true