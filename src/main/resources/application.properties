# 1. PUERTO
server.port=${PORT:10000}

# 2. CONFIGURACI\u00D3N DE BASE DE DATOS
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/madridlink_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:madridlink2026}
spring.datasource.driver-class-name=${DATABASE_DRIVER:com.mysql.cj.jdbc.Driver}

# Evitar esperas infinitas
spring.datasource.hikari.initialization-fail-timeout=30000

# 3. PERSISTENCIA (Cambiado a update para evitar borrar todo)
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true

# 4. CARGA INICIAL (Cambiado a never para evitar errores de duplicados)
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

spring.datasource.hikari.leak-detection-threshold=2000