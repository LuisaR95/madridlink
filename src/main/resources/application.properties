# 1. PUERTO
server.port=8082

# 2. CONEXI\u00D3N A MYSQL (Ajustado para el motor real)

spring.datasource.url=jdbc:mysql://localhost:3307/madridlink_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=madridlink2026
# Cambiamos el dialecto de H2 al de MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 3. PERSISTENCIA

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# 4. CARGA INICIAL
# D\u00E9jalo en 'never' si vas a meter los datos a mano o mediante un DataLoader.java
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# 5. CONSOLA (MySQL no usa consola web de H2, se gestiona desde DBeaver)
# Puedes comentar estas l\u00EDneas o borrarlas, ya no se usan.
