# 1. Puerto
server.port=8082

# 2. Conexión a Base de Datos (XAMPP debe estar en VERDE)
spring.datasource.url=jdbc:mysql://localhost:3306/madrid_db?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. Configuración de JPA (Simplificada para Hibernate 7)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 4. Ajustes de seguridad y mensajes
server.error.message-level=always
spring.jpa.open-in-view=false
spring.sql.init.mode=always