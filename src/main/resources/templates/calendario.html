<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MadriLink - Mi Calendario</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        #calendar {
            background: white;
            padding: 15px;
            border-radius: 2rem;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
        }
        .fc-event { cursor: pointer; background-color: #1e3a8a !important; border: none !important; padding: 4px; border-radius: 8px; font-size: 0.75rem; }
        .fc-toolbar-title { font-weight: 800; color: #1e3a8a; font-size: 1.1rem !important; }
        .fc-button-primary { background-color: #1e3a8a !important; border: none !important; border-radius: 12px !important; font-size: 0.8rem !important; }
        /* Ajustes para mobile de FullCalendar */
        @media (max-width: 640px) {
            .fc-toolbar { flex-direction: column; gap: 10px; }
            #calendar { padding: 10px; border-radius: 1.5rem; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 pb-24">

<!-- NAV SUPERIOR -->
<nav class="bg-white border-b border-slate-100 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
        <a th:href="@{/}" class="flex items-center gap-2">
            <div class="bg-[#1e3a8a] p-1.5 rounded-lg">
                <i class="fas fa-link text-white text-xs"></i>
            </div>
            <span class="text-lg font-bold tracking-tight">Madri<span class="text-[#1e3a8a]">Link</span></span>
        </a>
    </div>
</nav>

<div class="max-w-4xl mx-auto px-4 py-6">
    <div class="mb-6">
        <h1 class="text-2xl font-black text-slate-800">📅 Mis Citas</h1>
        <p class="text-sm text-slate-500">Toca un día para agendar un recordatorio de trámite.</p>
    </div>

    <div id="calendar"></div>

    <!-- Leyenda / Info -->
    <div class="mt-6 bg-blue-50 p-4 rounded-2xl border border-blue-100 flex items-start gap-3">
        <i class="fas fa-info-circle text-blue-600 mt-0.5"></i>
        <p class="text-[11px] text-blue-700 leading-relaxed">
            Los recordatorios agendados aquí te enviarán una notificación por correo electrónico 24 horas antes de la fecha marcada.
        </p>
    </div>
</div>

<!-- NAVEGACIÓN INFERIOR (Mobile Only) -->
<div class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 px-8 py-3 flex justify-between items-center z-[100] shadow-lg">
    <a th:href="@{/}" class="flex flex-col items-center text-slate-400">
        <i class="fas fa-home text-xl"></i>
        <span class="text-[10px] font-bold mt-1">Inicio</span>
    </a>
    <a th:href="@{/mis-citas}" class="flex flex-col items-center text-[#1e3a8a]">
        <i class="fas fa-calendar-alt text-xl"></i>
        <span class="text-[10px] font-black mt-1">Citas</span>
    </a>
    <a th:href="@{/sedes}" class="flex flex-col items-center text-slate-400">
        <i class="fas fa-map-marker-alt text-xl"></i>
        <span class="text-[10px] font-bold mt-1">Sedes</span>
    </a>
    <a th:href="@{/comunidad}" class="flex flex-col items-center text-slate-400">
        <i class="fas fa-users text-xl"></i>
        <span class="text-[10px] font-bold mt-1">Foro</span>
    </a>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
      var calendarEl = document.getElementById('calendar');
      var calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        locale: 'es',
        events: '/api/citas',
        headerToolbar: {
            left: 'prev,next',
            center: 'title',
            right: 'today'
        },
        dateClick: function(info) {

          var tramite = prompt('¿Qué trámite quieres recordar?');
          if (tramite) {
              fetch('/citas/guardar', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                  body: 'tramite=' + encodeURIComponent(tramite) + '&fechaHora=' + info.dateStr + 'T10:00:00'
              }).then(res => {
                  if(res.ok) {
                      calendar.refetchEvents();
                  }
              });
          }
        }
      });
      calendar.render();
    });
</script>

</body>
</html>
