<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MadriLink - Mi Calendario</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        #calendar {
            background: white;
            padding: 30px;
            border-radius: 24px;
            border: 1px border-slate-200;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .fc-event { cursor: pointer; background-color: #1e3a8a !important; border: none !important; padding: 3px; border-radius: 6px; }
        .fc-toolbar-title { font-weight: 800; color: #1e3a8a; }
        .fc-button-primary { background-color: #1e3a8a !important; border: none !important; border-radius: 10px !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

<nav class="bg-white border-b border-slate-200 sticky top-0 z-50 mb-6">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
            <div class="flex items-center">
                <div class="flex-shrink-0 flex items-center gap-2">
                    <div class="bg-[#1e3a8a] p-2 rounded-lg">
                        <i class="fas fa-link text-white"></i>
                    </div>
                    <span class="text-xl font-bold tracking-tight text-slate-800">Madri<span class="text-[#1e3a8a]">Link</span></span>
                </div>
                <div class="hidden sm:ml-8 sm:flex sm:space-x-8 h-full">
                    <a th:href="@{/}" class="text-slate-500 hover:text-slate-700 inline-flex items-center px-1 pt-1 text-sm font-medium">Dashboard</a>
                    <a th:href="@{/tramites}" class="text-slate-500 hover:text-slate-700 inline-flex items-center px-1 pt-1 text-sm font-medium">Trámites</a>
                    <a th:href="@{/mis-citas}" class="border-b-2 border-[#1e3a8a] text-[#1e3a8a] inline-flex items-center px-1 pt-1 text-sm font-medium">
                        <i class="fas fa-calendar-alt mr-2"></i> Mis Citas
                    </a>
                    <a th:href="@{/sedes}" class="text-slate-500 hover:text-slate-700 inline-flex items-center px-1 pt-1 text-sm font-medium">Sedes</a>
                    <a th:href="@{/comunidad}" class="text-slate-500 hover:text-slate-700 inline-flex items-center px-1 pt-1 text-sm font-medium">Comunidad</a>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <div th:if="${#authorization.expression('isAuthenticated()')}" class="flex items-center gap-3">
                    <div class="text-right hidden sm:block">
                        <p class="text-xs font-bold text-slate-800" th:text="${#authentication.name}">usuario@email.com</p>
                        <form th:action="@{/logout}" method="post">
                            <button type="submit" class="text-[10px] text-red-500 font-bold uppercase hover:underline">Cerrar Sesión</button>
                        </form>
                    </div>
                    <img th:src="'https://ui-avatars.com/api/?name=' + ${#authentication.name} + '&background=1e3a8a&color=fff'" class="h-8 w-8 rounded-full border border-slate-200">
                </div>
            </div>
        </div>
    </div>
</nav>

<div class="max-w-5xl mx-auto px-4 py-6">
    <div class="mb-8">
        <h1 class="text-2xl font-extrabold text-slate-800">Gestión de Citas Personales</h1>
        <p class="text-sm text-slate-500">Haz clic en un día para agendar un recordatorio.</p>
    </div>

    <div id="calendar"></div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
      var calendarEl = document.getElementById('calendar');
      var calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        locale: 'es',
        events: '/api/citas',
        dateClick: function(info) {
          var tramite = prompt('¿Qué trámite quieres recordar?');
          if (tramite) {
              fetch('/citas/guardar', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                  body: 'tramite=' + encodeURIComponent(tramite) + '&fechaHora=' + info.dateStr + 'T10:00:00'
              }).then(res => {
                  if(res.ok) {
                      calendar.refetchEvents();
                      alert('Cita agendada. Recibirás un recordatorio por email.');
                  }
              });
          }
        }
      });
      calendar.render();
    });
</script>

</body>
</html>
