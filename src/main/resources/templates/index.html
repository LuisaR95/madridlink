<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MadriLink - Inicio</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f4; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #d32f2f; text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 25px; font-size: 0.9em; }

        .nav-directorio {
            text-align: center;
            margin: 20px 0; padding: 20px; background: #fff5f5;
            border-radius: 15px; border: 2px dashed #ffcdd2;
        }
        .btn-directorio {
            background: #d32f2f; color: white; padding: 12px 25px;
            text-decoration: none; border-radius: 30px; font-weight: bold;
            display: inline-block; transition: 0.3s;
        }
        .btn-directorio:hover { background: #b71c1c; transform: scale(1.05); }

        .tramite-card {
            padding: 20px; border: 1px solid #eee; border-radius: 12px;
            margin-bottom: 20px; background: #fff;
        }
        .tramite-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .tramite-titulo { font-weight: bold; font-size: 1.2em; color: #222; }

        .progress-container {
            width: 100%; background-color: #eee; border-radius: 10px;
            height: 10px; overflow: hidden; margin-bottom: 10px;
        }
        .progress-bar {
            height: 100%; background: #d32f2f;
            transition: width 0.6s ease-in-out;
        }
        .link-ver { color: #d32f2f; text-decoration: none; font-weight: bold; font-size: 0.9em; }
        h3 { margin-top: 30px; border-left: 4px solid #d32f2f; padding-left: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📍 MadriLink</h1>
    <p class="subtitle">Tu guía personal para trámites en Madrid</p>

    <div class="nav-directorio">
        <p style="margin-top: 0;">¿Necesitas saber dónde ir?</p>
        <a href="/sedes/buscar" class="btn-directorio">🔍 Buscar Oficinas y Sedes</a>
    </div>

    <h3>Mis Trámites en curso:</h3>

    <div th:each="t : ${tramites}" class="tramite-card">
        <div class="tramite-header">
            <span class="tramite-titulo" th:text="${t.titulo}">Título</span>
            <span th:if="${t.completado}" style="color: green; font-weight: bold;">✅ Finalizado</span>
            <span th:unless="${t.completado}" style="color: #666; font-size: 0.9em;">En proceso...</span>
        </div>

        <div class="progress-container">
            <div class="progress-bar"
                 th:style="'width: ' + (${t.completado} ? '100%' : '30%')">
            </div>
        </div>

        <div style="text-align: right;">
            <a th:href="@{'/tramite/' + ${t.id}}" class="link-ver">Gestionar documentos →</a>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(tramites)}" style="text-align: center; color: #999; margin-top: 20px;">
        <p>No tienes trámites agregados todavía.</p>
    </div>
</div>

</body>
</html>
