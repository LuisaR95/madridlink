<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MadriLink - Mi Panel de Trámites</title>
    <style>
        :root { --primary: #1e3a8a; --bg: #f8fafc; --white: #ffffff; --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #334155; margin: 0; padding: 40px 20px; }
        .container { max-width: 900px; margin: auto; }

        .nav-header {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--white); padding: 20px 30px; border-radius: 16px;
            box-shadow: var(--shadow); margin-bottom: 30px;
        }
        .logo { color: var(--primary); font-weight: 800; font-size: 1.5rem; margin: 0; }

        .nav-buttons { display: flex; gap: 10px; }
        .btn-nav {
            text-decoration: none; padding: 10px 20px; border-radius: 10px;
            font-weight: 600; font-size: 0.9rem; transition: 0.2s;
        }
        .btn-blue { background: var(--primary); color: white; }
        .btn-light { background: #f1f5f9; color: #475569; }

        .tramite-card {
            background: var(--white); border-radius: 16px; padding: 25px;
            margin-bottom: 20px; box-shadow: var(--shadow); border: 1px solid #e2e8f0;
            display: grid; grid-template-columns: 1fr auto; align-items: center; transition: 0.2s;
        }
        .tramite-card:hover { transform: translateY(-3px); border-color: var(--primary); }

        .status-pill {
            padding: 4px 12px; border-radius: 99px; font-size: 0.75rem;
            font-weight: 700; text-transform: uppercase;
        }
        .status-done { background: #dcfce7; color: #166534; }
        .status-pending { background: #fee2e2; color: #991b1b; }

        .btn-manage {
            color: var(--primary); text-decoration: none; font-weight: 700;
            font-size: 0.9rem; display: flex; align-items: center; gap: 5px;
        }
    </style>
</head>
<body>
<div class="container">
    <header class="nav-header">
        <h1 class="logo">📍 MadriLink</h1>
        <nav class="nav-buttons">
            <a href="/sedes/buscar" class="btn-nav btn-light">🔍 Buscar Oficinas</a>
            <a href="/comunidad" class="btn-nav btn-blue">👥 Comunidad</a>
        </nav>
    </header>

    <h2 style="margin-bottom: 25px;">Mis Gestiones</h2>

    <div th:each="t : ${tramites}" class="tramite-card">
        <div>
            <h3 th:text="${t.titulo}" style="margin: 0 0 5px 0;">Título</h3>
            <span class="status-pill"
                  th:classappend="${t.progresoCalculado == 100} ? 'status-done' : 'status-pending'"
                  th:text="${t.progresoCalculado == 100 ? 'Completado' : 'En curso (' + t.progresoCalculado + '%)'}">
                </span>
            <p style="font-size: 0.85rem; color: #64748b; margin: 10px 0 0 0;">
                📍 <span th:text="${t.ubicacion}">Ubicación</span> • ⏳ <span th:text="${t.plazo}">Plazo</span>
            </p>
        </div>
        <a th:href="@{/tramite/{id}(id=${t.id})}" class="btn-manage">Ver Detalles →</a>
    </div>
</div>
</body>
</html>
