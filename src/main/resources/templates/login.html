<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MadriLink</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

<div class="w-full max-w-md">
    <!-- Brand -->
    <div class="text-center mb-10">
        <div class="inline-flex bg-[#1e3a8a] p-4 rounded-[1.5rem] shadow-xl mb-4">
            <i class="fas fa-link text-white text-3xl"></i>
        </div>
        <h1 class="text-4xl font-black text-slate-800 tracking-tighter">Madri<span class="text-[#1e3a8a]">Link</span></h1>
        <p class="text-slate-500 text-sm font-medium">Tu puerta de entrada a Madrid</p>
    </div>

    <!-- Login Card -->
    <div class="bg-white p-8 rounded-[3rem] shadow-2xl shadow-blue-900/5 border border-slate-50">
        <h2 class="text-xl font-black text-slate-800 mb-6 text-center">¡Bienvenido de nuevo!</h2>

        <!-- Alertas de error -->
        <div th:if="${param.error}" class="mb-6 p-4 bg-red-50 rounded-2xl border border-red-100 flex items-center gap-3">
            <i class="fas fa-exclamation-circle text-red-500"></i>
            <p class="text-xs font-bold text-red-600">Email o contraseña incorrectos.</p>
        </div>

        <form th:action="@{/login}" method="post" class="space-y-4">
            <div class="space-y-1">
                <div class="relative">
                    <i class="fas fa-at absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-sm"></i>
                    <input type="email" name="username" placeholder="Correo electrónico"
                           class="w-full pl-11 pr-4 py-4 bg-slate-50 border-none rounded-2xl text-sm focus:ring-2 focus:ring-blue-500 transition-all" required>
                </div>
            </div>

            <div class="space-y-1">
                <div class="relative">
                    <i class="fas fa-key absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-sm"></i>
                    <input type="password" name="password" placeholder="Contraseña"
                           class="w-full pl-11 pr-4 py-4 bg-slate-50 border-none rounded-2xl text-sm focus:ring-2 focus:ring-blue-500 transition-all" required>
                </div>
            </div>

            <button type="submit" class="w-full bg-[#1e3a8a] text-white py-4 rounded-2xl font-black text-sm shadow-lg shadow-blue-900/20 active:scale-[0.98] transition-all mt-4">
                INICIAR SESIÓN
            </button>
        </form>

        <div class="mt-10 text-center">
            <p class="text-xs text-slate-400 font-bold uppercase tracking-widest mb-2">¿Nuevo por aquí?</p>
            <a th:href="@{/registro}" class="text-[#1e3a8a] font-black text-sm hover:underline">
                CREA TU CUENTA GRATIS
            </a>
        </div>
    </div>
</div>

</body>
</html>
