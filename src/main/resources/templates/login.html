<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - MadriLink</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1e3a8a; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: var(--primary); text-align: center; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; }
        .btn { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: 700; cursor: pointer; }
        .mensaje { color: #16a34a; font-size: 0.9rem; margin-bottom: 15px; text-align: center; }
    </style>
</head>
<body>
<div class="card">
    <h2>Iniciar Sesión</h2>
    <p th:if="${mensaje}" th:text="${mensaje}" class="mensaje"></p>
    <p th:if="${param.error}" class="error" style="color:red; text-align:center;">Email o contraseña incorrectos</p>

    <form th:action="@{/login}" method="post">
        <input type="email" name="username" placeholder="Tu email" required>
        <input type="password" name="password" placeholder="Tu contraseña" required>
        <button type="submit" class="btn">Entrar</button>
    </form>
    <p style="text-align: center; margin-top: 20px; font-size: 0.9rem;">
        ¿No tienes cuenta? <a th:href="@{/registro}" style="color: var(--primary); font-weight: 600;">Regístrate aquí</a>
    </p>
</div>
</body>
</html>
