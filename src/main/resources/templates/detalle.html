<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MadriLink - Detalle del Trámite</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f4; padding: 20px; color: #333; }
        .container { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #d32f2f; border-bottom: 2px solid #f4f4f4; padding-bottom: 10px; }
        .ficha-tecnica { background: #fff8f8; border: 1px solid #ffdde1; padding: 20px; border-radius: 10px; margin-bottom: 30px; }
        .sede-card { background: #e3f2fd; padding: 20px; border-radius: 10px; border-left: 5px solid #2196f3; margin-bottom: 30px; }
        .doc-item { background: #fafafa; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        .btn-check { border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        .btn-listo { background-color: #e8f5e9; color: #2e7d32; border: 1px solid #2e7d32; }
        .btn-pendiente { background-color: #fff3e0; color: #ef6c00; border: 1px solid #ef6c00; }
        .consejo-item { background: #fff; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #ddd; border-left: 4px solid #d32f2f; }
        .btn-volver { display: inline-block; margin-top: 30px; text-decoration: none; color: #666; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h1 th:text="${tramite.titulo}">Título</h1>
    <p th:text="${tramite.descripcion}">Descripción</p>

    <div class="ficha-tecnica">
        <h3>📍 Información General</h3>
        <p><strong>⏳ Plazo:</strong> <span th:text="${tramite.plazo}">30 días</span></p>
        <p><strong>🏢 Ubicación:</strong> <span th:text="${tramite.ubicacion}">Madrid</span></p>
    </div>

    <div class="sede-card" th:if="${tramite.sede != null}">
        <h3>🏢 Oficina Recomendada</h3>
        <p><strong th:text="${tramite.sede.nombre}">Nombre</strong></p>
        <p>📍 <span th:text="${tramite.sede.direccion}">Dirección</span></p>
    </div>

    <div class="seccion-docs" id="lista-documentos">
        <h3>📋 Documentación Requerida</h3>
        <div th:each="doc : ${documentos}" class="doc-item">
            <div>
                <strong th:text="${doc.nombre}">Nombre</strong><br>
                <small th:text="${doc.tipo} + ' | ' + ${doc.costo}"></small>
            </div>
            <form th:action="@{'/documento/marcar/' + ${doc.id}}" method="post">
                <button type="submit"
                        th:class="${doc.marcado} ? 'btn-check btn-listo' : 'btn-check btn-pendiente'"
                        th:text="${doc.marcado ? '✅ Listo' : '⏳ Pendiente'}"></button>
            </form>
        </div>
    </div>

    <div style="margin-top: 30px;">
        <h3>💬 Consejos</h3>
        <div th:each="c : ${tramite.consejos}" class="consejo-item">
            <p th:text="${c.contenido}">Contenido</p>
            <span style="font-weight: bold; color: #d32f2f;" th:text="'— ' + ${c.autor}">Autor</span>
        </div>
    </div>

    <a href="/" class="btn-volver">← Volver</a>
</div>
</body>
</html>
