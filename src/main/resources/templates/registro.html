<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - MadriLink</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

<div class="w-full max-w-md">
    <!-- Logo/Brand -->
    <div class="text-center mb-8">
        <div class="inline-flex bg-[#1e3a8a] p-3 rounded-2xl shadow-lg mb-4">
            <i class="fas fa-link text-white text-2xl"></i>
        </div>
        <h1 class="text-3xl font-black text-slate-800 tracking-tight">Crea tu cuenta</h1>
        <p class="text-slate-500 text-sm mt-1">Únete a la comunidad de MadriLink</p>
    </div>

    <!-- Card Formulario -->
    <div class="bg-white p-8 rounded-[2.5rem] shadow-xl shadow-blue-900/5 border border-slate-100">
        <form th:action="@{/registro}" th:object="${usuario}" method="post" class="space-y-5">

            <div class="space-y-1">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Email</label>
                <div class="relative">
                    <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                    <input type="email" th:field="*{email}" placeholder="ejemplo@correo.com"
                           class="w-full pl-11 pr-4 py-4 bg-slate-50 border-none rounded-2xl text-sm focus:ring-2 focus:ring-blue-500 transition-all" required>
                </div>
                <span class="text-[10px] font-bold text-red-500 ml-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Contraseña</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                    <input type="password" th:field="*{password}" placeholder="Mínimo 6 caracteres"
                           class="w-full pl-11 pr-4 py-4 bg-slate-50 border-none rounded-2xl text-sm focus:ring-2 focus:ring-blue-500 transition-all" required>
                </div>
                <span class="text-[10px] font-bold text-red-500 ml-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
            </div>

            <button type="submit" class="w-full bg-[#1e3a8a] text-white py-4 rounded-2xl font-black text-sm shadow-lg shadow-blue-900/20 active:scale-[0.98] transition-all mt-2">
                REGISTRARME AHORA
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-50 text-center">
            <p class="text-sm text-slate-500">
                ¿Ya tienes una cuenta? <br>
                <a th:href="@{/login}" class="text-[#1e3a8a] font-black hover:underline">Inicia sesión aquí</a>
            </p>
        </div>
    </div>

    <!-- Footer simple -->
    <p class="text-center text-[10px] text-slate-400 mt-8 font-bold uppercase tracking-widest">
        &copy; 2026 MadriLink • Trámites sin Estrés
    </p>
</div>

</body>
</html>
