<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro - MadriLink</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1e3a8a; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: var(--primary); text-align: center; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; }
        .btn { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        /* Estilo para los mensajes de error debajo de los inputs */
        .field-error { color: #dc2626; font-size: 0.75rem; font-weight: 600; margin-bottom: 10px; display: block; }
        .input-group { margin-bottom: 15px; }
    </style>
</head>
<body>
<div class="card">
    <h2>Crear Cuenta</h2>

    <form th:action="@{/registro}" th:object="${usuario}" method="post">

        <div class="input-group">
            <input type="email" th:field="*{email}" placeholder="Correo electrónico" required>
            <span class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
        </div>

        <div class="input-group">
            <input type="password" th:field="*{password}" placeholder="Contraseña" required>
            <span class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
        </div>

        <button type="submit" class="btn">Registrarme</button>
    </form>

    <p style="text-align: center; margin-top: 20px; font-size: 0.9rem;">
        ¿Ya tienes cuenta? <a th:href="@{/login}" style="color: var(--primary); font-weight: 600;">Inicia sesión</a>
    </p>
</div>
</body>
</html>
